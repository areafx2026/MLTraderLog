<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FxLedger Board</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --border: #2a2a38;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --accent: #7c6af7;
    --ceo: #f7a26a;
    --cfo: #6af7c8;
    --cio: #6ab8f7;
    --cmo: #f76ab8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.05em; }

  #status-chip {
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.2s;
  }
  #status-chip.active { border-color: var(--accent); color: var(--accent); }

  #round-badge {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
  }

  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  #feed {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    display: flex;
    gap: 12px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }

  .avatar.ceo { background: color-mix(in srgb, var(--ceo) 15%, transparent); color: var(--ceo); }
  .avatar.cfo { background: color-mix(in srgb, var(--cfo) 15%, transparent); color: var(--cfo); }
  .avatar.cio { background: color-mix(in srgb, var(--cio) 15%, transparent); color: var(--cio); }
  .avatar.cmo { background: color-mix(in srgb, var(--cmo) 15%, transparent); color: var(--cmo); }

  .bubble {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    line-height: 1.6;
  }

  .bubble .name {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 5px;
  }

  .bubble.ceo .name { color: var(--ceo); }
  .bubble.cfo .name { color: var(--cfo); }
  .bubble.cio .name { color: var(--cio); }
  .bubble.cmo .name { color: var(--cmo); }

  .typing-indicator::after {
    content: '▋';
    animation: blink 0.8s infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  #sidebar {
    width: 320px;
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }

  #input-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  textarea {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    line-height: 1.5;
    min-height: 120px;
  }

  textarea:focus { outline: none; border-color: var(--accent); }

  .btn-group { display: flex; flex-direction: column; gap: 8px; }

  button {
    padding: 10px 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.15s;
  }

  button:disabled { opacity: 0.35; cursor: not-allowed; }

  #btn-start {
    background: var(--accent);
    color: #fff;
  }

  #btn-next {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }

  #btn-end {
    background: color-mix(in srgb, #f76a6a 15%, transparent);
    color: #f76a6a;
    border: 1px solid color-mix(in srgb, #f76a6a 30%, transparent);
  }

  #hint {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  #upload-section {
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  #upload-section h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  #drop-zone {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s;
  }

  #drop-zone:hover, #drop-zone.drag-over {
    border-color: var(--accent);
    color: var(--accent);
  }

  #file-list { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; }

  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
  }

  .file-item span { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .file-size { color: var(--muted); font-size: 11px; flex-shrink: 0; margin-left: 6px; }

  .btn-delete {
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0 0 0 6px;
    font-size: 14px;
    flex-shrink: 0;
  }
  .btn-delete:hover { color: #f76a6a; }
</style>
</head>
<body>

<header>
  <h1>FxLedger Board</h1>
  <div id="status-chip">Bereit</div>
  <div id="round-badge">Runde —</div>
</header>

<main>
  <div id="feed"></div>

  <div id="sidebar">
    <div id="input-area">
      <textarea id="ceo-input" placeholder="CEO-Impuls eingeben…"></textarea>
    </div>
    <div class="btn-group">
      <button id="btn-start">Runde starten</button>
      <button id="btn-next" disabled>Weiter (neue Iteration)</button>
      <button id="btn-end" disabled>Runde beenden &amp; speichern</button>
    </div>
    <div id="hint">Starte eine Runde mit einem Impuls. Die CxOs antworten der Reihe nach. Du kannst jederzeit einen neuen Impuls geben oder die Runde beenden.</div>

    <div id="upload-section">
      <h3>Dokumente für Agenten</h3>
      <div id="drop-zone">
        📎 Datei ablegen oder klicken<br>
        <span style="font-size:11px">.txt · .md · .pdf · max 10 MB</span>
      </div>
      <input type="file" id="file-input" accept=".txt,.md,.pdf" style="display:none">
      <div id="file-list"></div>
    </div>
  </div>
</main>

<script>
const feed = document.getElementById('feed');
const input = document.getElementById('ceo-input');
const statusChip = document.getElementById('status-chip');
const roundBadge = document.getElementById('round-badge');
const btnStart = document.getElementById('btn-start');
const btnNext = document.getElementById('btn-next');
const btnEnd = document.getElementById('btn-end');

let roundActive = false;
let streaming = false;
let currentEventSource = null;

const ROLE_CLASS = { ceo: 'ceo', cfo: 'cfo', cio: 'cio', cmo: 'cmo' };

function renderMd(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, label, text = '', typing = false) {
  const msgEl = document.createElement('div');
  msgEl.className = 'msg';
  msgEl.id = typing ? `typing-${role}` : null;

  const avatarEl = document.createElement('div');
  avatarEl.className = `avatar ${ROLE_CLASS[role] || 'ceo'}`;
  avatarEl.textContent = label;

  const bubbleEl = document.createElement('div');
  bubbleEl.className = `bubble ${ROLE_CLASS[role] || 'ceo'}`;

  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = label;

  const textEl = document.createElement('div');
  textEl.className = typing ? 'typing-indicator' : '';
  textEl.textContent = text;
  if (typing) textEl.id = `text-${role}`;

  bubbleEl.appendChild(nameEl);
  bubbleEl.appendChild(textEl);
  msgEl.appendChild(avatarEl);
  msgEl.appendChild(bubbleEl);
  feed.appendChild(msgEl);
  feed.scrollTop = feed.scrollHeight;
  return textEl;
}

function setStatus(text, active = false) {
  statusChip.textContent = text;
  statusChip.className = active ? 'active' : '';
}

function setButtons(active) {
  roundActive = active;
  btnStart.disabled = active || streaming;
  btnNext.disabled = !active || streaming;
  btnEnd.disabled = !active || streaming;
}

async function startStream() {
  if (streaming) return;
  streaming = true;
  setButtons(roundActive);

  currentEventSource = new EventSource('/stream');

  currentEventSource.addEventListener('speaker', e => {
    const { role, label } = JSON.parse(e.data);
    setStatus(`${label} antwortet…`, true);
    addMessage(role, label, '', true);
  });

  currentEventSource.addEventListener('chunk', e => {
    const { role, text } = JSON.parse(e.data);
    const textEl = document.getElementById(`text-${role}`);
    if (textEl) {
      textEl.classList.remove('typing-indicator');
      textEl._raw = (textEl._raw || '') + text;
      textEl.innerHTML = renderMd(textEl._raw);
    }
    feed.scrollTop = feed.scrollHeight;
  });

  currentEventSource.addEventListener('agent_done', e => {
    const { role } = JSON.parse(e.data);
    const msgEl = document.getElementById(`typing-${role}`);
    if (msgEl) msgEl.removeAttribute('id');
    const textEl = document.getElementById(`text-${role}`);
    if (textEl) textEl.removeAttribute('id');
  });

  currentEventSource.addEventListener('round_done', () => {
    currentEventSource.close();
    streaming = false;
    setStatus('Warte auf CEO', true);
    setButtons(true);
  });

  currentEventSource.addEventListener('done', () => {
    currentEventSource.close();
    streaming = false;
    setButtons(roundActive);
  });

  currentEventSource.onerror = () => {
    currentEventSource.close();
    streaming = false;
    setStatus('Fehler beim Stream', false);
    setButtons(roundActive);
  };
}

btnStart.addEventListener('click', async () => {
  const text = input.value.trim();
  if (!text) return;

  await fetch('/round/start', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });

  addMessage('ceo', 'CEO', text);
  input.value = '';
  const stateRes = await fetch('/state');
  const st = await stateRes.json();
  roundBadge.textContent = `Runde ${st.round_num}`;
  setButtons(true);
  setStatus('Agenten antworten…', true);
  await startStream();
});

btnNext.addEventListener('click', async () => {
  const text = input.value.trim();
  await fetch('/round/next', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  if (text) addMessage('ceo', 'CEO', text);
  input.value = '';
  setStatus('Agenten antworten…', true);
  await startStream();
});

btnEnd.addEventListener('click', async () => {
  setStatus('Speichere…', true);
  btnEnd.disabled = true;
  btnNext.disabled = true;
  await fetch('/round/end', { method: 'POST' });
  setStatus('Gespeichert', false);
  roundBadge.textContent = 'Runde —';
  setButtons(false);
  addMessage('ceo', 'CEO', '— Runde beendet. MD-Dateien aktualisiert. —');
});

// Strg+Enter sendet
input.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') {
    if (!roundActive) btnStart.click();
    else btnNext.click();
  }
});

// ── File Upload ───────────────────────────────────────────────────────────────

const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');

function formatSize(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

async function loadFiles() {
  const res = await fetch('/uploads');
  const files = await res.json();
  fileList.innerHTML = '';
  files.forEach(f => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <span title="${f.name}">${f.name}</span>
      <span class="file-size">${formatSize(f.size)}</span>
      <button class="btn-delete" title="Löschen" data-name="${f.name}">✕</button>
    `;
    fileList.appendChild(item);
  });
  fileList.querySelectorAll('.btn-delete').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch(`/uploads/${encodeURIComponent(btn.dataset.name)}`, { method: 'DELETE' });
      loadFiles();
    });
  });
}

async function uploadFile(file) {
  const form = new FormData();
  form.append('file', file);
  const res = await fetch('/upload', { method: 'POST', body: form });
  if (!res.ok) {
    const err = await res.json();
    alert(`Upload fehlgeschlagen: ${err.detail}`);
    return;
  }
  loadFiles();
}

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) uploadFile(fileInput.files[0]);
  fileInput.value = '';
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]);
});

// Beim Start Dateiliste laden
loadFiles();
</script>
</body>
</html>
