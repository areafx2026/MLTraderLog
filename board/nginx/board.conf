server {
    listen 80;
    server_name board.areafx.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name board.areafx.de;

    ssl_certificate /etc/letsencrypt/live/board.areafx.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/board.areafx.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Basic Auth
    auth_basic "FxLedger Board";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://localhost:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: kein Buffering, kein Timeout
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }
}
