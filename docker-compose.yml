version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: forexlog_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mltraderlog
      POSTGRES_USER: mltrader
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - forexlog_db_data:/var/lib/postgresql/data
    networks:
      - forexlog_net

  backend:
    build: ./backend
    container_name: forexlog_backend
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mltraderlog
      DB_USER: mltrader
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - forexlog_uploads:/app/uploads
    depends_on:
      - db
    networks:
      - forexlog_net

  frontend:
    build: ./frontend
    container_name: forexlog_frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
    networks:
      - forexlog_net

volumes:
  forexlog_db_data:
  forexlog_uploads:

networks:
  forexlog_net:
    driver: bridge
